services:
    xdmod:
        image: tools-ext-01.ccr.xdmod.org/xdmod:x86_64-rockylinux8.10.20240528-v11.0.2-3-01
        hostname: xdmod
        container_name: xdmod
        networks:
            - jupyter-net
        shm_size: 2g
        ports:
            - "8443:443"
        stdin_open: true
        tty: true
        command: sleep infinity
    notebook:
        image: xdmod-data
        hostname: notebook
        container_name: notebook
        environment:
            XDMOD_HOST: "https://xdmod:443/"
            JUPYTERHUB_JWT_URL: "http://jwt-service:9888/"
            CURL_CA_BUNDLE: "/etc/pki/tls/certs/xdmod.crt"
        networks:
            - jupyter-net
        ports:
            - "8888:8888"
        command: start-notebook.py --ServerApp.allow_origin='*' --NotebookApp.token=secret
    jwt-service:
        build: ./jwt-service
        hostname: jwt-service
        container_name: jwt-service
        secrets:
            - jwt-private-key
        networks:
            - jupyter-net
        expose:
            - 9888
networks:
    jupyter-net:
secrets:
    jwt-public-key:
        file: ./jwt-key.pub
    jwt-private-key:
        file: ./jwt-key

